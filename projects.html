<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Portfolio - Nuobei Zhang</title>
    <link rel="icon" href="img/icon.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .portfolio-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2%;
            grid-template-rows: masonry;
            grid-auto-flow: dense;

        }
        .portfolio-item {
            border: 1px solid #87ceeb;
            padding: 1rem;
            border-radius: 5px;
            box-sizing: border-box;
            background-color: #fff;
            display: block;
            flex-direction: column;
        }
        .portfolio-item h3 {
            margin: 0 0 1rem 0;
        }
        .portfolio-item img {
            max-width: 100%;
            border-radius: 5px;
            margin: 1rem 0;
            height: auto;
        }
        .portfolio-item p {
            flex-grow: 1;
        }
        @media (max-width: 768px) {
            .portfolio-items {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Nuobei Zhang</h1>
        <p>Data Scientist | University of Michigan Ann Arbor Graduate</p>
    </header>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="blog.html">Blogs</a>
        <a href="NuobeiZhangResume.pdf">CV</a>
    </div>

    <div class="container">
        <h2>Project Portfolio</h2>
        <div class="portfolio-items" id="portfolio-items"></div>
    </div>

    <footer>
        <p>&copy; 2024 Nuobei Zhang. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/masonry/4.2.2/masonry.pkgd.min.js"></script>

</body>
</html>
